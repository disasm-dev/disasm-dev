<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="DISASM: Bot protection, reverse-engineered.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0E10"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="4" fill="url(#amber)"/>

  <!-- faint disassembly motif -->
  <g fill="#f59e0b" opacity="0.06" font-family="'Cascadia Code','Consolas',monospace" font-size="15" letter-spacing="2">
    <text x="812" y="84">55 8B EC 83 EC 20 53 56 57 8B 7D 08</text>
    <text x="812" y="110">E8 9A FF FF FF 84 C0 74 1F 8B 45 0C</text>
    <text x="812" y="136">0F B6 11 88 14 30 40 3B C7 72 F4 5E</text>
    <text x="812" y="162">C3 90 90 6A 00 FF 15 4C 20 40 00 EB</text>
    <text x="812" y="188">8B 4D FC 64 89 0D 00 00 00 00 59 5D</text>
  </g>

  <!-- glyph -->
  <rect x="96" y="116" width="88" height="88" rx="14" fill="url(#amber)"/>
  <text x="140" y="178" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="58" fill="#141416">D</text>

  <!-- wordmark -->
  <text x="212" y="170" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="72" letter-spacing="10" fill="#FFFFFF">DISASM</text>
  <text x="624" y="170" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="30" letter-spacing="4" fill="#6B6B6B">.DEV</text>

  <!-- tagline -->
  <text x="214" y="212" font-family="'Segoe UI',Arial,sans-serif" font-weight="400" font-size="23" fill="#9A9A9A">Bot protection, reverse-engineered.</text>

  <!-- coverage row -->
  <text x="214" y="250" font-family="'Cascadia Code','Consolas',monospace" font-weight="700" font-size="15" letter-spacing="3" fill="#f59e0b">INCAPSULA<tspan fill="#3a3a3a">  ·  </tspan>DATADOME</text>
</svg>
